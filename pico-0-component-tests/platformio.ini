; Standalone Pico W component diagnostic project.
; Upload this to a Pico when testing one sensor/device at a time.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower

monitor_speed = 115200
upload_protocol = picotool

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12.5

build_flags =
    -D WIFI_SSID=\"YOUR_WIFI_NAME\"
    -D WIFI_PASS=\"YOUR_WIFI_PASSWORD\"
    -D MQTT_BROKER=\"192.168.1.172\"
    -D MQTT_BROKER_PORT=1883
    -D MQTT_CLIENT_ID=\"pico-0-component-tests\"
